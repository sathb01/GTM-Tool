<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GTM Readiness Intake</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --text: #182235;
      --muted: #5d6b7c;
      --border: #d4dce7;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --field-bg: #f8fafc;
      --soft: #eaf1ff;
      --warn: #b45309;
      --shadow: 0 8px 24px rgba(24, 34, 53, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
    }

    main {
      width: min(1280px, calc(100% - 32px));
      margin: 24px auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 18px;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      font-size: 32px;
      line-height: 1.15;
      margin-bottom: 8px;
    }

    h2 {
      font-size: 21px;
      margin-bottom: 8px;
    }

    h3 {
      font-size: 16px;
      margin-bottom: 8px;
    }

    p,
    li {
      color: var(--muted);
      line-height: 1.5;
    }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 16px;
      align-items: start;
    }

    nav {
      position: sticky;
      top: 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 12px;
    }

    nav a {
      display: block;
      color: var(--text);
      text-decoration: none;
      border-radius: 6px;
      padding: 9px 10px;
      font-size: 14px;
      line-height: 1.25;
    }

    nav a:hover,
    nav a.active {
      background: var(--soft);
      color: var(--accent-dark);
    }

    nav a.active {
      font-weight: 700;
      box-shadow: inset 3px 0 0 var(--accent);
    }

    form {
      display: grid;
      gap: 16px;
    }

    section,
    .action-bar {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .section-heading {
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
      padding-bottom: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      color: var(--text);
      font-weight: 700;
      margin-bottom: 6px;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--field-bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      font-size: 15px;
      padding: 10px;
    }

    .money-input {
      align-items: stretch;
      display: flex;
      width: 100%;
    }

    .money-prefix {
      align-items: center;
      background: var(--soft);
      border: 1px solid var(--border);
      border-radius: 6px 0 0 6px;
      border-right: 0;
      color: var(--accent-dark);
      display: flex;
      font-weight: 700;
      padding: 0 10px;
    }

    .money-input input {
      border-radius: 0 6px 6px 0;
    }

    .other-field {
      margin-top: 8px;
    }

    .other-field[hidden] {
      display: none;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: 2px solid var(--accent);
      border-color: var(--accent);
      background: #ffffff;
    }

    .required {
      color: var(--warn);
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      margin-top: 5px;
    }

    .summary-card {
      background: var(--soft);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-top: 22px;
      padding: 16px;
    }

    .summary-card h3 {
      margin-top: 0;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .summary-item {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
    }

    .summary-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 5px;
      text-transform: uppercase;
    }

    .summary-value {
      line-height: 1.4;
    }

    .repeatable-card-section {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .section-intro-card,
    .suggested-best-fit {
      background: var(--soft);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 14px;
      padding: 14px;
    }

    .section-intro-card h3 {
      margin: 0 0 6px;
    }

    .section-intro-card p {
      margin: 0 0 8px;
    }

    .section-intro-card ul {
      margin: 8px 0 0;
      padding-left: 20px;
    }

    .help-block-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 14px;
    }

    .help-block {
      background: var(--soft);
      border: 1px solid var(--border);
      border-radius: 8px;
      flex: 1 1 260px;
      padding: 10px 12px;
    }

    .help-block summary {
      color: var(--accent-dark);
      cursor: pointer;
      font-weight: 700;
      list-style-position: inside;
    }

    .help-block p {
      margin: 8px 0 0;
    }

    .help-block ul {
      margin: 8px 0 0;
      padding-left: 20px;
    }

    .help-more {
      color: var(--muted);
      font-weight: 400;
    }

    .repeatable-card-list {
      display: grid;
      gap: 16px;
    }

    .repeatable-card {
      background: var(--field-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }

    .repeatable-card-header {
      align-items: center;
      display: flex;
      gap: 12px;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .repeatable-card-header h4 {
      font-size: 16px;
      margin: 0;
    }

    .card-subsection {
      border-top: 1px solid var(--border);
      margin-top: 12px;
      padding-top: 12px;
    }

    .card-subsection:first-of-type {
      border-top: 0;
      margin-top: 0;
      padding-top: 0;
    }

    .card-subsection h5 {
      color: var(--muted);
      font-size: 14px;
      margin: 0 0 10px;
      text-transform: uppercase;
    }

    .card-subsection summary,
    .advanced-section summary {
      color: var(--accent-dark);
      cursor: pointer;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .advanced-section {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--field-bg);
      margin-top: 18px;
      padding: 14px;
    }

    .card-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .card-grid .full {
      grid-column: 1 / -1;
    }

    .generated-value-claim {
      background: #ffffff;
      border: 1px dashed var(--border);
      border-radius: 6px;
      margin-top: 14px;
      padding: 12px;
    }

    .fit-score-summary {
      background: #ffffff;
      border: 1px dashed var(--border);
      border-radius: 6px;
      margin-top: 14px;
      padding: 12px;
    }

    .generated-statement {
      background: #ffffff;
      border: 1px dashed var(--border);
      border-radius: 6px;
      margin-top: 14px;
      padding: 12px;
    }

    .generated-value-claim p,
    .fit-score-summary p,
    .generated-statement p {
      margin: 6px 0 0;
    }

    .checkbox-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .checkbox-option {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--field-bg);
      padding: 9px;
      font-weight: 400;
    }

    .checkbox-option input {
      width: auto;
      margin-top: 2px;
    }

    .multi-select-dropdown {
      position: relative;
    }

    .multi-select-trigger {
      background: var(--field-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 15px;
      min-height: 42px;
      padding: 10px;
      text-align: left;
      width: 100%;
    }

    .multi-select-dropdown-panel {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 6px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 6px;
      margin-top: 6px;
      max-height: 260px;
      overflow-y: auto;
      padding: 8px;
      position: absolute;
      width: 100%;
      z-index: 10;
    }

    .multi-select-dropdown-panel[hidden] {
      display: none;
    }

    .multi-select-summary {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      margin-top: 5px;
    }

    .repeatable-list {
      display: grid;
      gap: 8px;
    }

    .repeatable-item {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .repeatable-item input,
    .repeatable-item textarea {
      flex: 1;
    }

    .repeatable-item textarea {
      min-height: 64px;
    }

    .table-wrap {
      margin-top: 18px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 900px;
      border-collapse: collapse;
    }

    th,
    td {
      border-bottom: 1px solid var(--border);
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    td:first-child {
      min-width: 180px;
      color: var(--text);
      font-weight: 700;
    }

    td input,
    td select {
      min-width: 120px;
      font-size: 14px;
      padding: 8px;
    }

    .table-actions {
      margin-top: 10px;
    }

    .actions,
    .action-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .company-manager {
      align-items: end;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 10px;
      grid-template-columns: minmax(220px, 1fr) auto auto auto auto;
      margin-bottom: 16px;
      padding: 14px;
    }

    .company-manager label {
      margin: 0;
    }

    .company-manager .record-field {
      display: grid;
      gap: 6px;
    }

    .company-manager button {
      min-height: 42px;
    }

    .brand-browser {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      display: none;
      margin: -8px 0 16px;
      padding: 14px;
    }

    .brand-browser.open {
      display: block;
    }

    .brand-list {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      margin-top: 10px;
    }

    .brand-list button {
      background: var(--field-bg);
      border: 1px solid var(--border);
      color: var(--text);
      text-align: left;
    }

    .brand-list button:hover {
      background: var(--soft);
      color: var(--accent-dark);
    }

    button,
    .secondary-link {
      border: 0;
      border-radius: 6px;
      padding: 11px 16px;
      font-family: Arial, sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }

    button {
      background: var(--accent);
      color: #ffffff;
    }

    button:hover {
      background: var(--accent-dark);
    }

    button.secondary,
    .secondary-link {
      background: var(--soft);
      color: var(--accent-dark);
    }

    .status {
      color: var(--muted);
      font-size: 14px;
    }

    .status .inline-link {
      background: transparent;
      color: var(--accent-dark);
      padding: 0 2px;
      font-size: 14px;
      text-decoration: underline;
    }

    .status .inline-link:hover {
      background: transparent;
      color: var(--accent);
    }

    .quick-card-grid {
      display: grid;
      gap: 16px;
    }

    .quick-card {
      background: var(--field-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }

    .quick-card h3 {
      margin-bottom: 6px;
    }

    .quick-card .grid {
      margin-top: 12px;
    }

    .improvement-focus {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 8px;
      margin: 14px 0 18px;
      padding: 14px;
    }

    .improvement-focus h3 {
      margin: 0 0 8px;
    }

    .improvement-focus ul,
    .improvement-focus ol {
      margin-bottom: 10px;
      padding-left: 20px;
    }

    .improvement-focus .action-bar {
      margin-top: 10px;
    }

    @media (max-width: 900px) {
      main {
        width: min(100% - 20px, 1280px);
        margin: 16px auto;
      }

      header,
      .layout {
        grid-template-columns: 1fr;
        display: block;
      }

      nav {
        position: static;
        margin-bottom: 16px;
      }

      .grid,
      .card-grid,
      .checkbox-grid {
        grid-template-columns: 1fr;
      }

      .company-manager {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>ICP &amp; GTM Readiness Intake</h1>
        <p>An online intake workbook for ICP definition, GTM strategy, sales activity review, target prioritization, and readiness scoring.</p>
      </div>
      <div class="actions">
        <button type="button" class="secondary" id="researchButton">Copy Research Prompt</button>
        <span class="status" id="researchStatus">Copies a ChatGPT research prompt without using API credits.</span>
      </div>
    </header>

    <div class="company-manager" aria-label="Company records">
      <div class="record-field">
        <label for="brandSearch">Brand</label>
        <input id="brandSearch" list="savedBrandOptions" placeholder="Search">
        <datalist id="savedBrandOptions"></datalist>
      </div>
      <button type="button" class="secondary" id="browseBrandsButton">Browse</button>
      <button type="button" class="secondary" id="newCompanyButton">New</button>
      <button type="button" class="secondary" id="saveCompanyButton">Save</button>
      <button type="button" class="secondary" id="clearFormButton">Clear Form</button>
    </div>

    <div class="brand-browser" id="brandBrowser" aria-label="Saved brands">
      <h2>Saved Brands</h2>
      <div class="brand-list" id="brandList"></div>
    </div>

    <div class="layout">
      <nav id="sectionNav" aria-label="Intake sections"></nav>
      <form id="intakeForm">
        <div id="sections"></div>
        <div class="action-bar" id="mainDetailedActions" hidden>
          <button type="submit" id="submitButton">Generate GTM Readiness Plan</button>
          <button type="button" class="secondary" id="saveDraftButton">Save Company</button>
          <a class="secondary-link" href="results.html" id="viewResultsLink">View Last Results</a>
          <span class="status" id="saveStatus"></span>
        </div>
      </form>
    </div>
  </main>

  <script src="gtm-taxonomy.js?v=20260617-revenue-motions"></script>
  <script src="intake-schema.js?v=20260617-revenue-motions"></script>
  <script src="app.js?v=20260622-record-safe-results"></script>
  <script src="ai-research.js?v=20260616-quick-review"></script>
</body>
</html>
